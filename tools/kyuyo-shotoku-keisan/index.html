<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給与所得控除 かんたん計算</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<link rel="stylesheet" href="../../shared/components.css">
<style>
  /* ══════════════════════════════════════════
     ページ全体（salary-calculator / catalog 準拠）
  ═══════════════════════════════════════════ */
  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'ヒラギノ角ゴ ProN W3', 'Hiragino Sans', sans-serif;
    background: var(--base-bg);
    background-image:
      radial-gradient(circle at 15% 20%, rgba(168,213,186,0.18) 0%, transparent 45%),
      radial-gradient(circle at 85% 80%, rgba(74,140,111,0.07) 0%, transparent 45%);
    color: var(--text-main);
    min-height: 100vh;
    padding: 20px 16px 48px;
    margin: 0 auto;
  }
  @media (min-width: 640px) { body { padding: 36px 24px 60px; } }
  /* app-scope オーバーライド */
  .app-scope { max-width: 900px; }
  @media (min-width: 800px) {
    .ds-page-cols {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      align-items: start;
    }
  }

  /* ─ 背景パーティクル（軽量化） ─ */
  .app-scope #particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .app-scope .particle {
    position:absolute; border-radius:50%; pointer-events:none;
    animation: particleDrift linear infinite;
  }
  @keyframes particleDrift {
    0%   { transform:translateY(100vh) scale(0) rotate(0deg); opacity:0; }
    10%  { opacity:0.3; }
    90%  { opacity:0.3; }
    100% { transform:translateY(-20px) scale(1) rotate(360deg); opacity:0; }
  }

  /* ─ コンテナ ─ */
  .app-scope .container { position:relative; z-index:10; margin:0 auto; padding:0; }
  @keyframes shimmerBar { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ─ 入力（ds-input-underline アンダーライン） ─ */
  .app-scope .input-section { margin-bottom: 20px; }
  .app-scope .input-section label {
    display: block;
    font-size: clamp(0.9rem, 2.5vw, 1rem);
    font-weight: 600;
    color: var(--text-main);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }

  /* ─ スライダー（ds-range シンプル） ─ */
  .app-scope .ds-range-wrap { margin-top: 12px; }

  /* ─ クイックボタン ─ */
  .app-scope .quick-label { font-size:11px; color:var(--sub-text); letter-spacing:0.1em; margin:8px 0 8px; }
  .app-scope .quick-btns { display:flex; flex-wrap:wrap; gap:8px; }
  .app-scope .quick-btn {
    padding: 7px 16px;
    border: 1px solid var(--sys-border);
    border-radius: 20px;
    background: transparent;
    font-size: 12px;
    color: var(--sub-text);
    cursor: pointer;
    transition: all 0.25s cubic-bezier(0.34,1.56,0.64,1);
    letter-spacing: 0.04em;
  }
  .app-scope .quick-btn:hover { border-color:var(--accent-deep); color:var(--accent-deep); background:var(--mint-pale); transform:scale(1.08); }
  .app-scope .quick-btn:active { transform:scale(0.95); }
  .app-scope .quick-btn.selected { background:var(--accent-deep); color:var(--card-bg); border-color:var(--accent-deep); box-shadow:0 2px 12px rgba(74,140,111,0.35); }

  /* ─ 区切り ─ */
  .app-scope .divider { height:1px; background:linear-gradient(90deg,transparent,var(--mint-light),transparent); margin:28px 0; }

  /* ─ 結果 ─ */
  .app-scope .result-label { font-size:11px; font-weight:500; letter-spacing:0.14em; color:var(--sub-text); margin-bottom:10px; text-transform:uppercase; }
  .app-scope .ds-result.highlight .ds-result-value { color:var(--accent-deep); }

  /* ─ バー ─ */
  .app-scope .ratio-bar-wrap { margin-top:10px; }
  .app-scope .ratio-bar-bg { height:6px; background:var(--mint-light); border-radius:3px; overflow:hidden; margin-bottom:4px; }
  .app-scope .ratio-bar-fill {
    height:100%; background:linear-gradient(90deg,var(--data-blue-2),var(--data-blue-1));
    border-radius:3px; width:0%; transition:width 1s cubic-bezier(0.22,0.61,0.36,1);
    position:relative; overflow:hidden;
  }
  .app-scope .ratio-bar-fill::after {
    content:''; position:absolute; top:0; left:-100%; width:60%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
    animation:barShimmer 2s ease-in-out infinite;
  }
  @keyframes barShimmer { 0%{left:-100%} 100%{left:200%} }
  .app-scope .ratio-text { font-size:11px; color:var(--sub-text); text-align:right; }

  /* ─ ドーナツ（chart-donut.js + ds-donut-summary） ─ */
  .app-scope .donut-wrap.ds-donut-summary {
    margin: 16px 0 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .app-scope .donut-wrap.ds-donut-summary:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(74,140,111,0.12); }

  /* ─ 計算式 ─ */
  .app-scope .formula-box {
    margin-top: 12px;
    padding: 16px 20px;
    background: var(--mint-pale);
    border-radius: 12px;
    font-size: 12px;
    color: var(--sub-text);
    letter-spacing: 0.04em;
    line-height: 1.8;
    border: 1px dashed var(--sys-border);
  }
  .app-scope .formula-box strong { color:var(--accent-deep); font-weight:500; }

  /* ─ 法律メモ ─ */
  .app-scope .legal-note {
    margin-top:14px; padding:14px 18px; background:rgba(168,213,186,0.1);
    border-radius:12px; border-left:3px solid var(--accent);
    font-size:11px; color:var(--sub-text); line-height:1.8; letter-spacing:0.05em;
  }

  /* ─ コンフェッティ ─ */
  .app-scope #confetti-wrap { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; overflow:hidden; }
  .app-scope .confetti-piece { position:absolute; animation:confettiFall linear forwards; opacity:0; }
  @keyframes confettiFall {
    0%   { transform:translateY(-20px) rotate(0deg) scale(0); opacity:1; }
    100% { transform:translateY(100vh) rotate(720deg) scale(0.4); opacity:0; }
  }

  /* ─ トースト ─ */
  .app-scope .toast {
    position:fixed; bottom:30px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:var(--accent-deep); color:var(--card-bg); padding:12px 28px;
    border-radius:40px; font-size:13px; letter-spacing:0.08em;
    box-shadow:0 6px 24px rgba(74,140,111,0.4);
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    opacity:0; z-index:1000; white-space:nowrap;
  }
  .app-scope .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ─ フッター（コンテンツ内フッター） ─ */
  .app-scope .app-footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 0 20px 40px;
    margin-top: 24px;
    font-size: 11px;
    color: var(--sub-text);
    letter-spacing: 0.08em;
    line-height: 2;
  }

  @media(max-width:480px) {
    .app-scope .ds-result-value { font-size:22px; }
    .app-scope h1 { font-size:20px; }
    .app-scope .donut-wrap.ds-donut-summary { flex-direction:column; }
  }
</style>
</head>
<body>
<main class="app-scope">

<div id="particles"></div>
<div id="confetti-wrap"></div>
<div class="toast" id="toast"></div>

<header class="ds-page-title">
  <h1>給与所得控除かんたん計算</h1>
  <p>Annual Salary Deduction Calculator</p>
</header>

<div class="ds-page-cols">
  <div class="ds-input-col">
    <div class="ds-card">
      <div class="ds-card-label">条件設定</div>
      <!-- 入力エリア -->
      <div class="input-section">
        <label>💴 額面年収を入力してください</label>
        <div class="ds-val-row">
          <input class="ds-input-underline" type="text" id="salary-input" placeholder="例：5,000,000" inputmode="numeric"
            oninput="onInputChange(this)" onblur="onInputBlur(this)" onfocus="onInputFocus(this)" />
          <span class="ds-val-unit">円</span>
        </div>

        <!-- スライダー（ピル有り ±ボタン無し） -->
        <div class="ds-stepper-wrap">
          <div class="ds-stepper-wrap-inner">
            <div class="ds-stepper-pill" id="salary-slider-pill">
              <div class="ds-stepper-pill-label" id="salary-slider-pill-label">0円</div>
              <div class="ds-stepper-pill-line"></div>
            </div>
            <div class="ds-stepper-shimmer" id="salary-slider-shimmer"></div>
            <input type="range" class="ds-stepper-range" id="salary-slider"
              min="0" max="15000000" step="10000" value="4000000" data-unit="円"
              oninput="onSliderChange(this)" />
          </div>
        </div>

        <!-- クイックボタン -->
        <div class="quick-label">よく使われる年収</div>
        <div class="quick-btns">
          <button class="quick-btn" onclick="setAmount(3000000,this)">300万</button>
          <button class="quick-btn" onclick="setAmount(4000000,this)">400万</button>
          <button class="quick-btn" onclick="setAmount(5000000,this)">500万</button>
          <button class="quick-btn" onclick="setAmount(6000000,this)">600万</button>
          <button class="quick-btn" onclick="setAmount(8000000,this)">800万</button>
          <button class="quick-btn" onclick="setAmount(10000000,this)">1,000万</button>
        </div>
      </div>

      <div class="divider"></div>
    </div>
  </div>

  <div class="ds-result-col">
    <div class="ds-card">
      <div class="ds-card-label">シミュレーション結果</div>
    <div id="result-content" class="result-content">

      <!-- 控除額 -->
      <div class="ds-result">
        <div class="ds-result-label">給与所得控除額</div>
        <div class="ds-result-value">
          <span id="deduction-num">0</span>
          <span class="ds-result-unit">円</span>
        </div>
        <div class="ratio-bar-wrap">
          <div class="ratio-bar-bg"><div class="ratio-bar-fill" id="deduction-bar"></div></div>
          <div class="ratio-text" id="deduction-ratio"></div>
        </div>
      </div>

      <!-- 控除後の金額 -->
      <div class="ds-result highlight">
        <div class="ds-result-label">給与所得控除後の給与等の金額（所得）</div>
        <div class="ds-result-value">
          <span id="income-num">0</span>
          <span class="ds-result-unit">円</span>
        </div>
      </div>

      <!-- ドーナツグラフ（chart-donut.js） -->
      <div class="donut-wrap ds-donut-summary" id="donutChart"></div>

      <!-- 計算式 -->
      <div class="formula-box" id="formula-box"></div>
      <!-- 法律メモ -->
      <div class="legal-note" id="legal-note"></div>
    </div>
    </div><!-- /ds-card -->
  </div>
</div>

<!-- コンテンツ内フッター（base.js が挿入する <footer> とは別） -->
<div class="app-footer">
  所得税法 別表第五「年末調整等のための給与所得控除後の給与等の金額の表」に基づいて計算しています。<br>
  令和7年（2025年）分：給与所得控除の最低保障額が <strong style="color:var(--accent-deep)">65万円</strong> に引き上げられました。<br>
  本ツールはあくまで参考値です。正確な計算は税理士・国税庁へご確認ください。
</div>

<div class="back-to-index">
  <a href="../../index.html">← マネーツールへ戻る</a>
</div>

<script src="../../shared/base.js"></script>
<script src="../../shared/chart-donut.js"></script>
<script>
(function(){ 'use strict';

/* ─ 背景パーティクル ─ */
(function() {
  const wrap = document.getElementById('particles');
  const colors = ['rgba(168,213,186,0.4)','rgba(74,140,111,0.2)','rgba(208,237,220,0.5)','rgba(232,245,241,0.6)'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 4 + Math.random() * 10;
    p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*16}s;`;
    wrap.appendChild(p);
  }
})();

/* ─ コンフェッティ ─ */
function fireConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#a8d5ba','#4a8c6f','#d4ede3','#e8f5f1','#7fc49e','#2d7a5a'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `left:${10+Math.random()*80}%;top:${-10+Math.random()*5}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1.2+Math.random()*1.3}s;animation-delay:${Math.random()*0.5}s;border-radius:${Math.random()>0.5?'50%':'2px'};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;`;
    wrap.appendChild(c);
    setTimeout(() => c.remove(), 3000);
  }
}

/* ─ トースト ─ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ─ 状態 ─ */
const currentYear = 7;
let currentRawValue = 4000000;
let prevIncome = null;
let rafId = null;

/* ─ クイックボタン ─ */
function setAmount(v, btn) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  currentRawValue = v;
  document.getElementById('salary-input').value = fmtComma(v);
  document.getElementById('salary-slider').value = Math.min(v, 15000000);
  updateSalarySlider(document.getElementById('salary-slider'));
  calculate();
}

/* ─ 入力 ─ */
/* NOTE: fmtComma は base.js の fmtYen と同等だが、
         fmtYen は「¥」記号付きの場合があるため独自実装を維持 */
function fmtComma(n) { return n ? n.toLocaleString('ja-JP') : ''; }

/** スライダー背景＋ピル（カンマ付き円表示）を更新 */
function updateSalarySlider(sl) {
  updateSliderBg(sl);
  const pillLabel = document.getElementById(sl.id + '-pill-label');
  if (pillLabel) {
    const val = parseInt(sl.value) || 0;
    pillLabel.textContent = fmtComma(val) + '円';
  }
}

function onInputChange(el) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
  const pos = el.selectionStart, oldLen = el.value.length;
  const raw = el.value.replace(/[^0-9]/g, '');
  const num = parseInt(raw) || 0;
  currentRawValue = num;
  el.value = num ? fmtComma(num) : '';
  const diff = el.value.length - oldLen;
  try { el.setSelectionRange(pos + diff, pos + diff); } catch(e) {}
  document.getElementById('salary-slider').value = Math.min(num, 15000000);
  updateSalarySlider(document.getElementById('salary-slider'));
  calculate();
}

function onSliderChange(el) {
  document.querySelectorAll('.quick-btn').forEach(b => b.classList.remove('selected'));
  const num = parseInt(el.value) || 0;
  currentRawValue = num;
  document.getElementById('salary-input').value = fmtComma(num);
  updateSalarySlider(el);
  calculate();
}

function onInputFocus(el) { setTimeout(() => el.select(), 0); }
function onInputBlur(el)  { el.value = currentRawValue ? fmtComma(currentRawValue) : ''; }

/* ─ 計算ロジック（別表第五） ─ */
function calcAfterDeduction(salary, year) {
  const minG = year >= 7 ? 650000 : 550000;
  if (salary < 6600000) {
    const base = Math.floor(salary / 4000) * 4000;
    let after;
    if (base <= 1625000)      after = base - minG;
    else if (base <= 1800000) after = base - Math.floor(Math.max(base * 0.4 - 100000, minG));
    else if (base <= 3600000) after = Math.floor(base * 0.7 - 80000);
    else                      after = Math.floor(base * 0.8 - 440000);
    return Math.max(0, Math.floor(after / 200) * 200);
  } else {
    const ded = salary <= 8500000 ? salary * 0.1 + 1100000 : 1950000;
    return Math.max(0, salary - Math.floor(ded));
  }
}

/* ─ 数字アニメーション ─ */
/* NOTE: base.js の animateNum(el, from, to, ms, fmt) と同名だが、
         このアプリは独自の easing (1-(1-p)^4) と rafId 管理を持つため
         上書き定義として維持 */
function animateNum(el, from, to, ms) {
  if (rafId) cancelAnimationFrame(rafId);
  const t0 = performance.now();
  function step(now) {
    const p = Math.min((now - t0) / ms, 1);
    const ease = 1 - Math.pow(1 - p, 4);
    el.textContent = Math.round(from + (to - from) * ease).toLocaleString('ja-JP');
    if (p < 1) rafId = requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ─ ドーナツ（chart-donut.js） ─ */
function updateDonut(salary, deduction, income) {
  if (typeof renderDonutChart === 'function') {
    const donutSegs = [
      { value: deduction, label: '給与所得控除額', hint: 'tax' },
      { value: income, label: '控除後の所得', hint: 'takehome' }
    ];
    const donutTotal = donutSegs.reduce((s, x) => s + (x.value || 0), 0) || 1;
    const donutLargest = donutSegs.reduce((a, b) => (a.value || 0) > (b.value || 0) ? a : b);
    const donutPct = Math.round(((donutLargest.value || 0) / donutTotal) * 100);
    renderDonutChart(document.getElementById('donutChart'), donutSegs, {
      title: '給与の内訳',
      showPct: true,
      format: (n) => (n || 0).toLocaleString('ja-JP') + '円',
      centerLabel: { value: donutPct + '%', sub: donutLargest.label }
    });
  }
}

/* ─ メイン計算 ─ */
function calculate() {
  const salary = currentRawValue;
  const rc  = document.getElementById('result-content');

  if (salary <= 0) {
    return;
  }

  const income    = calcAfterDeduction(salary, currentYear);
  const deduction = Math.max(0, salary - income);
  const ratio     = salary > 0 ? Math.min(100, (deduction / salary) * 100) : 0;

  // 数字アニメーション
  const dedEl = document.getElementById('deduction-num');
  const incEl = document.getElementById('income-num');
  const fromDed = parseInt(dedEl.textContent.replace(/,/g,'')) || 0;
  const fromInc = parseInt(incEl.textContent.replace(/,/g,'')) || 0;
  animateNum(dedEl, fromDed, deduction, 700);
  animateNum(incEl, fromInc, income,   700);

  // バー
  setTimeout(() => {
    document.getElementById('deduction-bar').style.width = ratio.toFixed(1) + '%';
  }, 80);
  document.getElementById('deduction-ratio').textContent = `年収の約 ${ratio.toFixed(1)}% を控除`;

  // ドーナツ
  setTimeout(() => updateDonut(salary, deduction, income), 100);

  // 計算式テキスト
  const base = salary < 6600000 ? Math.floor(salary / 4000) * 4000 : salary;
  const minGLabel = currentYear >= 7 ? '65万円' : '55万円';
  let formula;
  if      (base <= 1625000) formula = `最低保障額 ${minGLabel} を適用`;
  else if (base <= 1800000) formula = `${base.toLocaleString()}円 × 40% − 100,000円（最低保障: ${minGLabel}）`;
  else if (base <= 3600000) formula = `${base.toLocaleString()}円 × 70% − 80,000円（控除後の金額算出）`;
  else if (base <= 6600000) formula = `${base.toLocaleString()}円 × 80% − 440,000円（控除後の金額算出）`;
  else if (salary <= 8500000) formula = `控除額 = ${salary.toLocaleString()}円 × 10% + 1,100,000円`;
  else    formula = `控除額 上限 195万円（年収 850万円超）`;

  const areaNote = salary < 6600000 && salary !== base
    ? `<br><span style="color:#a0bdb5;font-size:11px;">※ 別表第五の区間単位（4,000円）に合わせ ${salary.toLocaleString()}円 → 区間下限 ${base.toLocaleString()}円 で計算（同区間は控除後の金額が同じ）</span>`
    : '';

  document.getElementById('formula-box').innerHTML =
    `<strong>計算式：</strong>${formula}${areaNote}<br><strong>計算結果：</strong>${salary.toLocaleString()}円 − ${deduction.toLocaleString()}円 = ${income.toLocaleString()}円`;

  const basis = currentYear >= 7 ? '令和7年（2025年）分' : '令和6年（2024年）分';
  document.getElementById('legal-note').innerHTML =
    `📋 ${basis} 所得税法 別表第五に基づく計算です。<br>660万円未満は4,000円刻みの区間ごとに「控除後の給与等の金額」が固定されています。`;

  // コンフェッティ＆トースト（年収が大きく変わったとき）
  if (prevIncome !== null && Math.abs(income - prevIncome) > 200000) {
    fireConfetti();
    const diff = income - prevIncome;
    if (diff > 0) showToast(`🎉 所得が ${diff.toLocaleString()}円 増えました！`);
    else          showToast(`📉 所得が ${Math.abs(diff).toLocaleString()}円 変わりました`);
  }
  prevIncome = income;
}

/* 初期表示 */
document.getElementById('salary-input').value = fmtComma(4000000);
document.querySelector('.quick-btn[onclick*="4000000"]').classList.add('selected');
updateSalarySlider(document.getElementById('salary-slider'));
calculate();

/* インラインイベントハンドラ用にグローバルへ公開 */
window.setAmount = setAmount;
window.onInputChange = onInputChange;
window.onSliderChange = onSliderChange;
window.onInputFocus = onInputFocus;
